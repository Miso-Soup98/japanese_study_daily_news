name: Generate daily Japanese news

on:
  schedule:
    # 00:00 Asia/Tokyo = 15:00 UTC on the previous calendar day.
    - cron: "0 15 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate today's report
        env:
          PYTHONUTF8: "1"
        run: python generate_daily_news.py --no-open

      - name: Commit updated report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html output/
          if git diff --cached --quiet; then
            echo "No report changes"
          else
            git commit -m "Update daily news $(date -u +%F)"
            git push
          fi

